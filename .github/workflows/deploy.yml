name: Deploy to Server

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches: [main]
    # Only run if the CI workflow succeeded
    # Using conditional checks in the job

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no user@your.server.com << 'EOF'
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/refa-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/refa-frontend:latest
            # Add commands to restart containers or services
            docker-compose -f /path/to/docker-compose.yml up -d --remove-orphans
          EOF
