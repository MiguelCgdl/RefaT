name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend-nest/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ./backend-nest
      - name: Run Linter
        run: npm run lint
        working-directory: ./backend-nest

  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node: ['18.x', '20.x']
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: backend-nest/package-lock.json
      - name: Install backend deps
        run: npm ci
        working-directory: ./backend-nest
      - name: Run backend tests
        run: npm run test
        working-directory: ./backend-nest

  test-frontend:
    name: Frontend Tests (Next.js)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: ./frontend-next
      - name: Run Build
        run: npm run build
        working-directory: ./frontend-next

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend-nest
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/refa-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/refa-backend:commit-${{ github.sha }}
      - name: Build Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend-next
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/refa-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/refa-frontend:commit-${{ github.sha }}

  upload-artifacts:
    name: Upload Test Reports
    runs-on: ubuntu-latest
    needs: [test, test-frontend]
    steps:
      - name: Upload Backend Test Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-test-report
          path: ./backend-nest/test-report.xml
      - name: Upload Frontend Build
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: ./frontend-next/.next
