name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Backend Tests (NestJS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend-nest/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ./backend-nest
      - name: Run Linter
        run: npm run lint
        working-directory: ./backend-nest

  test-frontend:
    name: Frontend Tests (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend-next
      - name: Run Build
        run: npm run build
        working-directory: ./frontend-next

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend-nest
          push: false
          tags: refa-backend:latest
          
      - name: Build Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend-next
          push: false
          tags: refa-frontend:latest
